{% macro menu_button(url, svg_path, text) %}
<button onclick="window.location.href='{{ url }}'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        {{ svg_path | safe }}
    </svg>
    <span>{{ text }}</span>
</button>
{% endmacro %}

{% macro menu_divider() %}
<hr>
{% endmacro %}
